<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* NAVBAR */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 40px;
  background: #222;
  color: white;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 10px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
  background: #4CAF50;
  color: white;
}

.hero button {
  padding: 10px 20px;
  border: none;
  background: white;
  color: #4CAF50;
  cursor: pointer;
  margin-top: 10px;
}

/* GALLERY */
.gallery {
  padding: 40px;
  text-align: center;
}

.gallery-grid {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.gallery img {
  width: 250px;
  border-radius: 10px;
}

/* CONTACT SECTION */
.contact {
  padding: 40px;
  background: #f5f5f5;
  text-align: center;
}

/* FORM */
form {
  max-width: 400px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px;
  width: 100%;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}

/* FOOTER */
footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 20px;
}

.social-icons a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>House finder</h2>
  <div>
    <a href="#">Home</a>
    <a href="#gallery">Gallery</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO SECTION -->
<section class="hero">
  <h1>House Finder</h1>
  <p>We create beautiful and modern designs houses</p>
  <button>Get Started</button>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
  <h2>HOUSES</h2>
  <div class="gallery-grid">
    <pre ><img src="Screenshot 2026-04-10 100031.png" height="175"> </pre>
    <pre> <img src="Screenshot 2026-04-10 100044.png" height="175"> </pre>
    <pre><img src="Screenshot 2026-04-10 100021.png" height="175"> </pre>
  </div>
</section>

<!-- CONTACT SECTION -->
<section class="contact" id="contact">
  <h2>Contact Us</h2>

  <!-- CONTACT FORM -->
  <form>
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required>
    <textarea rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Submit</button>
  </form>

</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 MyWebsite. All rights reserved.</p>

  <div class="social-icons">
    <a href="#">🌐</a>
    <a href="#">📘</a>
    <a href="#">📸</a>
    <a href="#">🐦</a>
  </div>
</footer>

</body>
</html>
